version: 0.2

env:
  variables:
    AWS_REGION: ap-northeast-3
    ACCOUNT_ID: 860616632758
    FRONTEND_REPO: frontend-repo
    BACKEND_REPO: backend-repo
    DATABASE_REPO: database-repo

phases:

  pre_build:
    commands:
      - echo Logging into ECR
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

  build:
    commands:
      - echo Building frontend image
      - docker build -t $FRONTEND_REPO ./frontend

      - echo Building backend image
      - docker build -t $BACKEND_REPO ./backend

      - echo Building database image
      - docker build -t $DATABASE_REPO ./database

      - docker tag $FRONTEND_REPO:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:latest
      - docker tag $BACKEND_REPO:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:latest
      - docker tag $DATABASE_REPO:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$DATABASE_REPO:latest

  post_build:
    commands:
      - echo Pushing images to ECR
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:latest
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:latest
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$DATABASE_REPO:latest

artifacts:
  files:
    - appspec.yml
    - deploy.sh
