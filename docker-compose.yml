version: "3.8"

services:

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - app-network

  db:
    build: ./database
    ports:
      - "3306:3306"
    networks:
      - app-network

networks:
  app-network:
